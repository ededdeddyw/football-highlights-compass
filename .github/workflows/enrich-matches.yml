name: Enrich matches (独自記事の生成)

# 試合ページの独自記事（ネタバレなしの前フリ）をClaudeで生成し data/match-previews.json に反映する。
# 手動実行のみ。limit で一度に生成する件数を絞る（サンプル確認→段階展開のため）。
# 生成物(site/)はCIで作られるため、ここでは build→enrich→build→データのみコミット。本番反映は deploy-ftp を別途実行。
on:
  workflow_dispatch:
    inputs:
      limit:
        description: '一度に生成する件数（記事未生成の試合から）'
        required: false
        default: '4'
      ids:
        description: '対象を特定IDに限定する場合（カンマ区切り・任意）'
        required: false
        default: ''
  # 夜間の見どころ生成キャッチアップ用：30分ごとに未生成分を自動生成（対象が無くなれば即終了＝無駄打ちなし）。
  # バックログが片付いたら、この schedule 2行を削除/コメントアウトして頻度を落とすこと。
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

concurrency:
  group: enrich-matches
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 依存導入（undici=タイムアウト延長用）
        run: npm install undici --no-save --no-package-lock --no-audit --no-fund

      - name: 試合インデックスを生成（build）
        run: node scripts/build-site.mjs

      # 生成ステップは16分で打ち切る（ジョブ全体20分より短く）。打ち切られても後続で生成済み分を必ずコミットする。
      - name: 独自記事を生成（enrich）
        timeout-minutes: 45
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          RUN_DATE: ${{ github.run_id }}
        run: node scripts/enrich-matches.mjs --limit=${{ github.event.inputs.limit || '80' }} ${{ github.event.inputs.ids && format('--ids={0}', github.event.inputs.ids) || '' }}

      - name: 記事をページに反映（再build）
        if: always()
        run: node scripts/build-site.mjs

      - name: データをコミット（match-previews.json 等）
        if: always()
        run: |
          git config user.name  "Claude"
          git config user.email "noreply@anthropic.com"
          git add data/match-previews.json data/matches-index.json
          if git diff --cached --quiet; then echo "変更なし。"; exit 0; fi
          git commit -m "content: 試合ページの独自記事を生成（enrich-matches）"
          git pull --rebase --autostash || true
          git push
