name: Watch league (公式ハイライト自動検知)

# 五大リーグの公式ハイライトをYouTubeから検知して data/league-<code>-<season>.json の videoId を埋める。
# diag=1 のときは診断のみ（--dry-run で書き込みなし）。通常実行はデータをコミット。
on:
  workflow_dispatch:
    inputs:
      code:
        description: 'リーグコード（bl/pl/sa/laliga/ligue1・空で全部）'
        required: false
        default: 'bl'
      limit:
        description: '1リーグあたりの検知上限'
        required: false
        default: '20'
      diag:
        description: '診断のみ（dry-run）= 1'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: watch-league
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: 検知
        run: node scripts/watch-league.mjs ${{ github.event.inputs.code && format('--code={0}', github.event.inputs.code) || '' }} --limit=${{ github.event.inputs.limit }} ${{ github.event.inputs.diag == '1' && '--diag --dry-run' || '' }}
      - name: データをコミット
        if: ${{ always() && github.event.inputs.diag != '1' }}   # 検知ステップがタイムアウトで打ち切られても途中保存分を必ずコミット
        run: |
          git config user.name  "Claude"
          git config user.email "noreply@anthropic.com"
          git add data/league-*.json
          if git diff --cached --quiet; then echo "変更なし。"; exit 0; fi
          git commit -m "video: リーグ公式ハイライトを紐付け（watch-league）"
          git pull --rebase --autostash || true
          git push
