name: Watch WC knockout

# 決勝トーナメントのハイライト自動連携を GitHub のサーバーで 24/7 実行（PC不要）。鮮度優先の分離型。
# ①勝ち上がり(対戦カード)をWeb生成(advance・毎時) ②公式RECAP動画を検知(watch・結果不問・毎回・無料)
# ③結果をWeb検証(verify・毎時) ④差分あれば build→deploy→commit
# 注: 動画は ANTHROPIC_API_KEY 無しでも出る（②は結果に依存しない）。①③はキー設定時のみ（対戦カード生成/スコア反映）。
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'   # 15分ごと（動画検知は毎回／結果検証は毎時1回にthrottle）。W杯終了後はこの2行を再コメントで停止

permissions:
  contents: write

concurrency:
  group: wc-knockout
  cancel-in-progress: false

jobs:
  knockout:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 万一どこか（特にFTP）でハングしても6h占有せず自己終了。concurrency詰まり防止
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      # API系(advance/verify)は毎時1回だけ（分<15の回＝毎時:00の回のみ）。手動実行は常に実行。
      - name: 現在の分を取得（throttle用）
        id: clk
        run: echo "m=$(date -u +%-M)" >> "$GITHUB_OUTPUT"
      - name: API系の依存を導入（毎時のみ・undici=タイムアウト延長用）
        if: ${{ github.event_name == 'workflow_dispatch' || fromJSON(steps.clk.outputs.m) < 15 }}
        run: npm install undici --no-save --no-package-lock --no-audit --no-fund

      # ① 勝ち上がり(対戦カード)を生成：R16勝者→QF、QF勝者→SF… の組み合わせをWeb検証で追加（毎時・キー要）
      - name: 勝ち上がり対戦カードをWeb生成（advance・毎時・キー未設定ならスキップ）
        if: ${{ github.event_name == 'workflow_dispatch' || fromJSON(steps.clk.outputs.m) < 15 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: node scripts/advance-knockout.mjs

      # ② 動画検知は毎回（無料・結果に依存しない）＝鮮度の要
      - name: 公式RECAP動画を検知（結果不問・確定タイトル一致のみ）
        run: node scripts/watch-knockout.mjs

      # ③ 結果検証(API)は毎時1回だけ。キー未設定なら即スキップ（無害）
      - name: 結果をWeb検証（Claude API・毎時1回・キー未設定ならスキップ）
        if: ${{ github.event_name == 'workflow_dispatch' || fromJSON(steps.clk.outputs.m) < 15 }}
        timeout-minutes: 12   # web検索付きAPIは長い。ハング時は打ち切って後続へ（次回再試行・無害）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 任意: リポジトリ Variables に ANTHROPIC_MODEL を設定するとモデル上書き（未設定なら既定=Sonnet）
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: node scripts/verify-results.mjs

      - name: 差分の判定（結果 or 動画が変わったか）
        id: diff
        run: |
          if git diff --quiet -- data/wc-knockout.json site/index.html; then
            echo "changed=0" >> "$GITHUB_OUTPUT"; echo "変更なし。";
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"; echo "変更あり。";
          fi

      - name: サイト生成
        if: steps.diff.outputs.changed == '1'
        run: node scripts/build-site.mjs

      - name: FTP デプロイ（本番 highlight-compass.com）
        if: steps.diff.outputs.changed == '1'
        timeout-minutes: 8   # FTPサーバ側でハングしてもここで打ち切る（今回6h占有の再発防止）。失敗時は次回再デプロイ
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          npm install basic-ftp --no-save --no-package-lock --no-audit --no-fund
          node scripts/deploy.mjs

      - name: コミット＆push
        if: steps.diff.outputs.changed == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git commit -m "auto: W杯決勝T 結果・ハイライトを反映（GitHub Actions）" || echo "no changes"
          git pull --rebase --autostash || true
          git push
