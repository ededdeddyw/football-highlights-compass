name: Watch WC knockout

# 決勝トーナメントの結果検証＋ハイライト自動連携を GitHub のサーバーで 24/7 実行（PC不要）。
# 手順: ①結果をWeb検証(Claude API)→ wc-knockout.json ②公式RECAP動画を検知(watch-knockout) ③差分あれば build→deploy→commit
# 注: ANTHROPIC_API_KEY 未登録の間は①がスキップされ、②③（動画検知・記事化・デプロイ）だけが動く。
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'   # 3時間ごと（Actions cronは遅延・スキップあり）。W杯終了後はこの2行を再コメントで停止

permissions:
  contents: write

concurrency:
  group: wc-knockout
  cancel-in-progress: false

jobs:
  knockout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 結果をWeb検証（Claude API・確定分のみ／キー未設定ならスキップ）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/verify-results.mjs

      - name: 公式RECAP動画を検知（結果確定済みの試合）
        run: node scripts/watch-knockout.mjs

      - name: 差分の判定（結果 or 動画が変わったか）
        id: diff
        run: |
          if git diff --quiet -- data/wc-knockout.json site/index.html; then
            echo "changed=0" >> "$GITHUB_OUTPUT"; echo "変更なし。";
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"; echo "変更あり。";
          fi

      - name: サイト生成
        if: steps.diff.outputs.changed == '1'
        run: node scripts/build-site.mjs

      - name: FTP デプロイ（本番 highlight-compass.com）
        if: steps.diff.outputs.changed == '1'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          npm install basic-ftp --no-save --no-package-lock --no-audit --no-fund
          node scripts/deploy.mjs

      - name: コミット＆push
        if: steps.diff.outputs.changed == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git commit -m "auto: W杯決勝T 結果・ハイライトを反映（GitHub Actions）" || echo "no changes"
          git pull --rebase --autostash || true
          git push
