name: Fetch league (五大リーグ 日程・結果の取得)

# リーグの日程・結果を OpenLigaDB 等から取得し data/league-<code>-<season>.json に保存する。
# フェーズ1はブンデス(bl)のみ。手動実行で取得→データのみコミット（本番反映は別途 deploy-ftp）。
on:
  workflow_dispatch:
    inputs:
      code:
        description: 'リーグコード（bl=ブンデス）'
        required: false
        default: 'bl'
      season:
        description: 'シーズン開始年（2025=2025-26）'
        required: false
        default: '2025'

permissions:
  contents: write

concurrency:
  group: fetch-league
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: 取得
        run: node scripts/fetch-league.mjs "${{ github.event.inputs.code }}" "${{ github.event.inputs.season }}"
      - name: データをコミット
        run: |
          git config user.name  "Claude"
          git config user.email "noreply@anthropic.com"
          git add data/league-*.json
          if git diff --cached --quiet; then echo "変更なし。"; exit 0; fi
          git commit -m "data: リーグ日程・結果を取得（fetch-league）"
          git pull --rebase --autostash || true
          git push
